examples:
  - title: Minimal catalog
    content: |
      A single catalog containing one concept scheme with two concepts.
      Type annotations are omitted; they will be inferred during semantic uplift.
    snippets:
      - language: json
        ref: examples/minimal.json
        base-uri: https://example.org/

  - title: Catalog with concept scheme and collection
    content: |
      A catalog containing a concept scheme (all animal species) and a collection
      (domestic pets) referencing a subset of those concepts.
    snippets:
      - language: json
        ref: examples/catalog-with-collection.json
        base-uri: https://example.org/

  - title: Catalog mixing concept scheme, collection, dataset, and resource
    content: |
      A land cover catalog combining a concept scheme (LCCS-based types), a collection
      (urban subset), a dataset (global map), and an external resource (FAO specification).
    snippets:
      - language: json
        ref: examples/mixed-catalog.json
        base-uri: https://example.org/

  - title: Multiple mixed catalogs
    content: |
      Two domain catalogs (climate and hydrology), each containing concept schemes,
      collections, datasets, and resources. Demonstrates how different entry types
      coexist within and across catalogs.
    snippets:
      - language: json
        ref: examples/mixed-multi-catalog.json
        base-uri: https://example.org/

  - title: Multiple catalogs with multilingual labels
    content: |
      An array of two catalogs. The first covers environmental data and demonstrates
      multilingual `name` values and a collection grouping a subset of a concept
      scheme. The second is a simpler species registry.
    snippets:
      - language: json
        ref: examples/multi-catalog.json
        base-uri: https://example.org/

  - title: Concept with an implicit narrower hierarchy
    content: |
      A single root concept declares one nested concept under `narrower`, with nothing else
      authored — no `type`, no `broader`, no `topConceptOf`. Semantic uplift infers both
      concepts' `type`, entails `skos:broader` on the child from the parent's `narrower`,
      anchors the child to the scheme via `skos:inScheme` propagation, and marks only the
      root (which has no `skos:broader`) as `skos:topConceptOf` the scheme.
    snippets:
      - language: json
        ref: examples/implicit-narrower.json
        base-uri: https://example.org/

  - title: Concept scheme with a broader/narrower hierarchy
    content: |
      A concept scheme demonstrating `skos:broader` / `skos:narrower` relations: "Animal" has
      "Mammal" and "Bird" nested inline as narrower concepts, "Mammal" in turn nests "Dog" and
      "Cat". A separate top concept, "Pet", references "Dog" and "Cat" by id to add a second
      `skos:broader` parent to each — a poly-hierarchy. Only "Animal" and "Pet" (which have no
      `skos:broader`) end up as `skos:topConceptOf` the scheme.
    snippets:
      - language: json
        ref: examples/concept-hierarchy.json
        base-uri: https://example.org/

  - title: Catalog with externally-defined items
    content: |
      A catalog whose items are plain IRI strings rather than embedded objects, for items
      (e.g. concept schemes, datasets) that are already defined elsewhere — possibly in a
      different graph. Each string becomes a `dct:hasPart` link to that IRI, without
      asserting any type or label locally.
    snippets:
      - language: json
        ref: examples/external-references.json
        base-uri: https://example.org/

  - title: Catalog with namespace prefix declarations
    content: |
      An array mixing namespace prefix declarations with a catalog. Prefix declarations
      have no `id` and are uplifted as standalone blank nodes, unrelated to the catalog
      or to each other — they are not part of the hierarchy, just global CURIE hints for Prez.
    snippets:
      - language: json
        ref: examples/catalog-with-prefixes.json
        base-uri: https://example.org/
