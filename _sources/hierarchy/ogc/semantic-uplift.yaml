additionalSteps:
  - description: Entails the inverse of asserted skos:broader/skos:narrower relations.
    type: sparql-update
    code: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      INSERT {
        ?a skos:broader ?b .
        ?b skos:narrower ?a .
      } WHERE {
        ?a skos:broader|^skos:narrower ?b
      }

  - description: >
      Propagates skos:inScheme along skos:narrower chains, so that concepts nested only inline
      (not listed directly under a ConceptScheme's concepts) are still anchored to their scheme.
    type: sparql-update
    code: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      INSERT {
        ?y skos:inScheme ?cs .
      } WHERE {
        ?x skos:inScheme ?cs .
        ?x skos:narrower+ ?y .
      }

  - description: >
      Enrich inScheme concepts that have no skos:broader within their own scheme (i.e. the roots
      of the concept hierarchy) with skos:topConceptOf, so that Prez displays even prettier
      hierarchies.
    type: sparql-update
    code: |
      PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
      INSERT {
        ?c skos:topConceptOf ?cs .
        ?cs skos:hasTopConcept ?c .
      } WHERE {
        ?c skos:inScheme ?cs .
        FILTER NOT EXISTS { ?c skos:broader|^skos:narrower ?broader . ?broader skos:inScheme ?cs }
      }
